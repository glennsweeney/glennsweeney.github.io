name: Build and run tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  # Single deploy job since we're just deploying
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit Tests
        run: npm run test:unit